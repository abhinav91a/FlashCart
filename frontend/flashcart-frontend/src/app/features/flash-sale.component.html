<main class="min-h-screen bg-slate-950 text-slate-50">
  <section class="max-w-6xl mx-auto py-10 px-4">
    <!-- Flash Sale Header -->
    <header class="mb-10 text-center">
      <h1 class="text-5xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 text-transparent bg-clip-text">
        ⚡ Flash Sale
      </h1>
      <p class="text-slate-400 mt-3 text-lg">
        Limited stock. Real-time updates. No second chances.
      </p>
      <div
        class="mt-6 text-4xl font-mono bg-slate-900 inline-block px-8 py-4 rounded-xl border border-slate-800 shadow-inner"
        role="timer"
        aria-live="polite"
      >
        {{ countdown() }}
      </div>
    </header>
  </section>

  <!-- Product list handles its own loading/error/data states -->
  <app-product-list></app-product-list>
</main>

<div class="min-h-screen bg-slate-950 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl">

    <h1 class="text-3xl font-bold text-center mb-2 bg-gradient-to-r from-emerald-400 to-cyan-400 text-transparent bg-clip-text">
      ⚡ FlashCart
    </h1>
    <p class="text-slate-400 text-center mb-8">
      {{ isRegister() ? 'Create your account' : 'Sign in to your account' }}
    </p>

    @if (error()) {
      <div class="mb-4 p-3 bg-red-900/30 border border-red-500/30 rounded-lg text-red-400 text-sm text-center">
        {{ error() }}
      </div>
    }

    <div class="space-y-4">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Email</label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-slate-50
                 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label class="block text-sm text-slate-400 mb-1">Password</label>
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-slate-50
                 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent"
          placeholder="••••••••"
        />
      </div>

      <button
        (click)="submit()"
        [disabled]="loading()"
        class="w-full bg-emerald-500 hover:bg-emerald-400 disabled:bg-slate-700
               text-slate-950 font-semibold rounded-lg px-4 py-3 transition-colors"
      >
        {{ loading() ? 'Please wait...' : (isRegister() ? 'Create Account' : 'Sign In') }}
      </button>
    </div>

    <p class="text-center text-slate-400 mt-6 text-sm">
      {{ isRegister() ? 'Already have an account?' : "Don't have an account?" }}
      <button
        (click)="isRegister.set(!isRegister())"
        class="text-emerald-400 hover:text-emerald-300 ml-1 font-medium"
      >
        {{ isRegister() ? 'Sign in' : 'Register' }}
      </button>
    </p>

    <div class="mt-4 text-center">
      <a routerLink="/" class="text-slate-500 hover:text-slate-400 text-sm">
        ← Back to Flash Sale
      </a>
    </div>
  </div>
</div>

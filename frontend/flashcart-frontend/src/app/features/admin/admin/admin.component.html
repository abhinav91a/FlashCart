<div class="max-w-5xl mx-auto py-10 px-4 text-slate-900 dark:text-white">
  <h2 class="text-3xl font-bold mb-8">Admin Panel</h2>

  <div *ngIf="success()" class="mb-4 p-3 bg-emerald-100 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-500/30 rounded-lg text-emerald-700 dark:text-emerald-400 text-sm">
    ✅ {{ success() }}
  </div>
  <div *ngIf="error()" class="mb-4 p-3 bg-red-100 dark:bg-red-900/30 border border-red-200 dark:border-red-500/30 rounded-lg text-red-700 dark:text-red-400 text-sm">
    ❌ {{ error() }}
  </div>

  <!-- Add Product Form -->
  <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 mb-8 shadow-sm">
    <h3 class="text-xl font-semibold mb-4">Add New Product</h3>
    <div class="grid grid-cols-2 gap-4">
      <input [(ngModel)]="newProduct.sku" placeholder="SKU"
        class="bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2 text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-emerald-400 outline-none" />
      <input [(ngModel)]="newProduct.name" placeholder="Name"
        class="bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2 text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-emerald-400 outline-none" />
      <input [(ngModel)]="newProduct.description" placeholder="Description"
        class="bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2 text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-emerald-400 outline-none col-span-2" />
      <input [(ngModel)]="newProduct.priceInCents" type="number" placeholder="Price in cents"
        class="bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2 text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-emerald-400 outline-none" />
      <input [(ngModel)]="newProduct.stock" type="number" placeholder="Stock"
        class="bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2 text-slate-900 dark:text-slate-50 focus:ring-2 focus:ring-emerald-400 outline-none" />
      <div class="col-span-2 flex items-center gap-3">
        <input type="checkbox" [(ngModel)]="newProduct.flashDeal" id="flashDeal"
          class="w-4 h-4 accent-emerald-500" />
        <label for="flashDeal" class="text-sm font-medium">⚡ Mark as Flash Deal</label>
      </div>
    </div>
    <button (click)="createProduct()"
      class="mt-4 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold px-6 py-2 rounded-lg transition-colors">
      + Add Product
    </button>
  </div>

  <!-- Product List -->
  <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
    <h3 class="text-xl font-semibold mb-4">Products</h3>
    <div *ngIf="loading()" class="text-slate-400 animate-pulse">Loading...</div>
    <table *ngIf="!loading()" class="w-full text-sm">
      <thead>
        <tr class="text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-800">
          <th class="text-left py-2">ID</th>
          <th class="text-left py-2">Name</th>
          <th class="text-left py-2">Price</th>
          <th class="text-left py-2">Stock</th>
          <th class="text-left py-2">Flash</th>
          <th class="text-left py-2">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of products()" class="border-b border-slate-100 dark:border-slate-800/50">
          <td class="py-3">{{ p.id }}</td>
          <td class="py-3 font-medium">{{ p.name }}</td>
          <td class="py-3">£{{ (p.priceInCents / 100) }}</td>
          <td class="py-3">{{ p.stock }}</td>
          <td class="py-3">
            <button (click)="toggleFlashDeal(p)"
              class="px-3 py-1 rounded-full text-xs font-bold transition-colors"
              [ngClass]="p.flashDeal ?
                'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400 hover:bg-emerald-200' :
                'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400 hover:bg-slate-200'">
              {{ p.flashDeal ? '⚡ Flash' : 'Normal' }}
            </button>
          </td>
          <td class="py-3">
            <button (click)="deleteProduct(p.id)"
              class="bg-red-600 hover:bg-red-500 text-white px-3 py-1 rounded-lg text-xs transition-colors">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

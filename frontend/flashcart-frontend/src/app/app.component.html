 <nav class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between">
      <a routerLink="/" class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 text-transparent bg-clip-text">
        ⚡ FlashCart
      </a>
      <div class="flex items-center gap-4 text-sm">
        <a routerLink="/" class="text-slate-400 hover:text-slate-200">Sale</a>
        <a *ngIf="auth.isLoggedIn()" routerLink="/orders" class="text-slate-400 hover:text-slate-200">My Orders</a>
        <a *ngIf="auth.isAdmin()" routerLink="/admin" class="text-emerald-400 hover:text-emerald-300">Admin</a>
        <button *ngIf="auth.isLoggedIn()" (click)="auth.logout()"
          class="text-slate-400 hover:text-red-400">Logout</button>
        <a *ngIf="!auth.isLoggedIn()" routerLink="/login"
          class="bg-emerald-500 text-slate-950 px-4 py-1.5 rounded-lg font-medium hover:bg-emerald-400">
          Sign In
        </a>
      </div>
    </nav>
      <!-- Theme Toggle -->
    <button
      (click)="toggleTheme()"
      class="fixed bottom-5 right-5 bg-slate-200 text-slate-900 dark:bg-slate-800 dark:text-slate-200
            px-4 py-2 rounded-lg text-sm shadow hover:bg-slate-300 dark:hover:bg-slate-700
            transition-colors duration-300"
    >
      {{ theme() === 'dark' ? '🌞 Light Mode' : '🌙 Dark Mode' }}
    </button>
    <router-outlet />

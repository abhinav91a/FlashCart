services:
  postgres:
    image: postgres:15
    container_name: flashcart-postgres
    environment:
      POSTGRES_USER: flashcart
      POSTGRES_PASSWORD: flashcart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - flashcart-net

  redis:
    image: redis:7
    container_name: flashcart-redis
    ports:
      - "6379:6379"
    networks:
      - flashcart-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: flashcart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - flashcart-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: flashcart-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - flashcart-net

  elasticsearch:
      image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
      container_name: flashcart-elasticsearch
      environment:
        - discovery.type=single-node
        - xpack.security.enabled=false
        - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      ports:
        - "9200:9200"
      networks:
        - flashcart-net
      volumes:
        - esdata:/var/lib/elasticsearch/data

  api-gateway:
    build: ../backend/api-gateway
    env_file:
      - ./common.env
    container_name: flashcart-api-gateway
    environment:
      JWT_SECRET: flashcart-super-secret-key-must-be-at-least-32-chars
    ports:
      - "8080:8080"
    depends_on:
      - product-service
      - order-service
      - search-service
    networks:
      - flashcart-net

  product-service:
    build: ../backend/product-service
    env_file:
      - ./common.env
    container_name: flashcart-product-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/productdb
      SPRING_DATASOURCE_USERNAME: productuser
      SPRING_DATASOURCE_PASSWORD: productpass
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    networks:
      - flashcart-net

  order-service:
    build:
      context: ../backend/order-service
    env_file:
      - ./common.env
    container_name: flashcart-order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      SPRING_DATASOURCE_USERNAME: orderuser
      SPRING_DATASOURCE_PASSWORD: orderpass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: flashcart-redis
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - flashcart-net

  inventory-service:
    build:
      context: ../backend/inventory-service
    env_file:
      - ./common.env
    container_name: flashcart-inventory-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: inventoryuser
      SPRING_DATASOURCE_PASSWORD: inventorypass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: flashcart-redis
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - flashcart-net

  notification-service:
    build:
      context: ../backend/notification-service
    env_file:
      - ./common.env
    container_name: flashcart-notification-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"
    depends_on:
      - kafka
    networks:
      - flashcart-net

  auth-service:
    build: ../backend/auth-service
    container_name: flashcart-auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: authuser
      SPRING_DATASOURCE_PASSWORD: authpass
      JWT_SECRET: flashcart-super-secret-key-must-be-at-least-32-chars
      JWT_EXPIRATION: 86400000
    ports:
      - "8085:8085"
    depends_on:
      - postgres
    networks:
      - flashcart-net

  search-service:
    build: ../backend/search-service
    env_file:
      - ./common.env
    container_name: flashcart-search-service
    environment:
      SPRING_ELASTICSEARCH_URIS: http://flashcart-elasticsearch:9200
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8086:8086"
    depends_on:
      - elasticsearch
      - kafka
    restart: on-failure
    networks:
      - flashcart-net

volumes:
  pgdata:
  esdata:

networks:
  flashcart-net:
    driver: bridge
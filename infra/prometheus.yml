global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'flashcart-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcart-api-gateway:8090']

  - job_name: 'flashcart-product'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcart-product-service:8081']

  - job_name: 'flashcart-order'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcart-order-service:8082']

  - job_name: 'flashcart-inventory'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcart-inventory-service:8083']

  - job_name: 'flashcart-notification'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcart-notification-service:8084']

  - job_name: 'flashcart-auth'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcart-auth-service:8085']

  - job_name: 'flashcart-search'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flashcart-search-service:8086']